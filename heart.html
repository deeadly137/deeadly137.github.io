<!doctype html>
<html class="no-js" lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>I LOVE YOUU</title>
  <meta name="description" content="Página especial com cubos pixelados.">
  <link rel="stylesheet" href="css/style.css">

  <meta property="og:title" content="I LOVE YOUU">
  <meta property="og:type" content="website">
  <meta property="og:url" content="">
  <meta property="og:image" content="img/wallpaper.png">
  <meta property="og:image:alt" content="Fundo com tema Pokémon">

  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#000000">
</head>
<body class="heart-page">
  <main class="page" aria-label="Página Heart">
    <h1 class="visually-hidden">Página Heart</h1>
  </main>

  <div class="heart-cubes" aria-hidden="true">
    <div class="cube" style="--x: 6vw; --size: 70px; --duration: 14s; --delay: -2s; --drift: 70vw;"></div>
    <div class="cube" style="--x: 14vw; --size: 90px; --duration: 18s; --delay: -6s; --drift: 60vw;"></div>
    <div class="cube" style="--x: 24vw; --size: 60px; --duration: 12s; --delay: -9s; --drift: 75vw;"></div>
    <div class="cube" style="--x: 30vw; --size: 80px; --duration: 16s; --delay: -4s; --drift: 65vw;"></div>

    <div class="cube" style="--x: 70vw; --size: 80px; --duration: 15s; --delay: -3s; --drift: -70vw;"></div>
    <div class="cube" style="--x: 78vw; --size: 100px; --duration: 19s; --delay: -7s; --drift: -60vw;"></div>
    <div class="cube" style="--x: 86vw; --size: 65px; --duration: 13s; --delay: -10s; --drift: -75vw;"></div>
    <div class="cube" style="--x: 92vw; --size: 85px; --duration: 17s; --delay: -5s; --drift: -65vw;"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
